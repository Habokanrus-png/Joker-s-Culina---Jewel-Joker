<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ruslana Habokan | Joker's Culina - Jewel Joker</title>
    <style>
        :root {
            --bg: #120521;
            --accent: #ffd700;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #b3a2c7;
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(147, 51, 234, 0.1) 0%, transparent 50%);
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 500px;
            padding-top: calc(env(safe-area-inset-top) + 60px);
            padding-bottom: 40px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 20px; padding-left: 20px; padding-right: 20px;
        }
        .nav {
            display: flex; justify-content: space-around;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 12px; border-radius: 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            position: sticky; top: 60px; z-index: 100;
        }
        .nav a {
            text-decoration: none; color: var(--text-dim); font-size: 13px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            padding: 8px 10px; transition: 0.3s;
        }
        .nav a.active { color: var(--accent); }
        
        .card {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px; padding: 35px; text-align: center;
            backdrop-filter: blur(30px); animation: fadeIn 0.8s ease;
        }
        .app-icon {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, #ffd700, #9333ea);
            border-radius: 22px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }
        h1 { font-size: 24px; margin: 0; color: var(--accent); line-height: 1.2; }
        .dev-tag { font-size: 12px; color: var(--text-dim); margin-top: 10px; letter-spacing: 2px; }
        .btn-start {
            background: var(--accent); color: #120521;
            padding: 18px; border-radius: 20px; text-decoration: none;
            font-weight: 800; text-align: center; margin-top: 10px;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        .btn-start:active { transform: scale(0.97); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="index.html" class="active">Home</a>
            <a href="marketing.html">About</a>
            <a href="privacy.html">Privacy</a>
            <a href="support.html">Support</a>
        </div>

        <div class="card">
            <div class="app-icon">🃏</div>
            <h1>Joker's Culina - Jewel Joker</h1>
            <div class="dev-tag">BY RUSLANA HABOKAN</div>
            <p style="color: var(--text-dim); line-height: 1.6; margin-top: 25px;">
                Welcome to the developer portal. I am committed to delivering high-quality, engaging experiences for iOS users. Explore my journey and app details below.
            </p>
        </div>

        <a href="marketing.html" class="btn-start">Read Developer Story</a>
    </div>
</body>
</html>
